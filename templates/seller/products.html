<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Seller — Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/seller.css') }}">
</head>
<body>

<div id="sidebarOverlay"></div>
<button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>

<aside class="sidebar">
    <div class="sidebar-logo">Luxe Seller</div>
    <ul class="sidebar-menu">
        <li><a href="/seller"><span class="icon">🏠</span> Dashboard</a></li>
        <li class="menu-group">STORE</li>
        <li><a href="/seller/products" class="active"><span class="icon">📦</span> Products</a></li>
        <li><a href="/seller/orders"><span class="icon">🛒</span> Orders</a></li>
        <li><a href="/seller/shipping"><span class="icon">🚚</span> Shipping</a></li>
        <li class="menu-group">FINANCE</li>
        <li><a href="/seller/earnings"><span class="icon">💰</span> Earnings</a></li>
        <li class="menu-group">PROFILE</li>
        <li><a href="/seller/store"><span class="icon">🏬</span> Store Profile</a></li>
        <li><a href="/seller/reviews"><span class="icon">⭐</span> Reviews</a></li>
    </ul>
    <div class="sidebar-footer">
        <div class="sidebar-user">🏪 {{ session.user.name }}</div>
        <a href="/logout" class="logout-link">🚪 Logout</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div class="topbar-title">Products</div>
        <div class="topbar-right">Seller Panel</div>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-header">
                <h2>My Products</h2>
                <div style="display:flex;gap:8px">
                    <input class="search-input" id="productSearch" style="width:200px" placeholder="Search products...">
                    <a href="/seller/products/add" class="btn btn-primary">+ Add Product</a>
                </div>
            </div>
            <div class="filter-tabs" style="padding:12px 16px;border-bottom:1px solid var(--border)">
                <button class="filter-tab active" onclick="setFilterTab(this, loadProducts, 'all')">All</button>
                <button class="filter-tab" onclick="setFilterTab(this, loadProducts, 'active')">Active</button>
                <button class="filter-tab" onclick="setFilterTab(this, loadProducts, 'inactive')">Inactive</button>
            </div>
            <table>
                <thead><tr><th>Product</th><th>Price</th><th>Stock</th><th>Sales</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="productsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/seller.js') }}"></script>
</body>
</html>
