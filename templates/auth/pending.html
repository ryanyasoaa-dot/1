<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe - Account Pending</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fff0f8, #f5ebff);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255,43,172,0.12);
            width: 100%; max-width: 440px;
            padding: 48px 40px;
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px; color: #1a1a3e;
            margin-bottom: 12px;
        }
        p { font-size: 14px; color: #2d2d5f; line-height: 1.7; margin-bottom: 28px; }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #FF2BAC, #FF6BCE);
            color: #fff; border-radius: 12px;
            font-size: 14px; font-weight: 700;
            text-decoration: none; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">⏳</div>
    <h1>Account Under Review</h1>
    <p>Your account has been submitted and is currently pending admin approval. We'll notify you via email once your account is approved.</p>
    <a href="/logout">Back to Login</a>
</div>
</body>
</html>
