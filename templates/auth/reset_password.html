<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Grande</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="card">
    <div class="logo">Grande</div>
    <p class="subtitle">Set your new password</p>

    {% if error %}
    <div style="background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:16px;text-align:center">
        {{ error }}
        <br><br>
        <a href="/forgot-password" style="color:#721c24;font-weight:600">Request a new link &rarr;</a>
    </div>
    {% else %}

    <div id="successMsg" style="display:none;background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:16px;text-align:center"></div>
    <div id="errorMsg"   style="display:none;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:16px;text-align:center"></div>

    <form id="resetForm">
        <div class="form-group">
            <label>New Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
                <span class="toggle-pw" id="togglePw">&#128065;&#65039;</span>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                <span class="toggle-pw" id="togglePw2">&#128065;&#65039;</span>
            </div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Reset Password</button>
    </form>

    <script>
    document.getElementById('togglePw').addEventListener('click', function () {
        const pw = document.getElementById('password');
        pw.type = pw.type === 'text' ? 'password' : 'text';
        this.textContent = pw.type === 'text' ? '&#128584;' : '&#128065;&#65039;';
    });
    document.getElementById('togglePw2').addEventListener('click', function () {
        const pw = document.getElementById('confirmPassword');
        pw.type = pw.type === 'text' ? 'password' : 'text';
        this.textContent = pw.type === 'text' ? '&#128584;' : '&#128065;&#65039;';
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw  = document.getElementById('password').value;
        const pw2 = document.getElementById('confirmPassword').value;
        document.getElementById('successMsg').style.display = 'none';
        document.getElementById('errorMsg').style.display   = 'none';

        if (pw !== pw2) {
            document.getElementById('errorMsg').textContent = 'Passwords do not match.';
            document.getElementById('errorMsg').style.display = 'block';
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Resetting...';

        const res  = await fetch('/reset-password/{{ token }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw })
        });
        const data = await res.json();

        btn.disabled = false;
        btn.textContent = 'Reset Password';

        if (data.success) {
            document.getElementById('successMsg').textContent = data.message + ' Redirecting to login...';
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('resetForm').style.display  = 'none';
            setTimeout(() => window.location.href = '/login', 2500);
        } else {
            document.getElementById('errorMsg').textContent = data.error || 'Something went wrong.';
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
    </script>
    {% endif %}

    <div class="register-link"><a href="/login">&larr; Back to Sign In</a></div>
</div>

</body>
</html>
