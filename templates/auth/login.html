<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="card">
    <div class="logo">Luxe</div>
    <p class="subtitle">Welcome back — sign in to continue</p>

    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Your password" required>
                <span class="toggle-pw" id="togglePw">&#128065;&#65039;</span>
            </div>
            <div style="text-align:right;margin-top:6px">
                <a href="/forgot-password" style="font-size:12px;color:#FF2BAC;text-decoration:none;font-weight:500">Forgot password?</a>
            </div>
        </div>
        <div id="captchaContainer" style="margin-bottom:16px">
            <div class="g-recaptcha" data-sitekey="{{ config['RECAPTCHA_SITE_KEY'] }}"></div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
    </form>

    <div class="register-link">Don't have an account? <a href="/register">Create one</a></div>
</div>

<!-- Popup Modal -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup">
        <div class="popup-icon" id="popupIcon"></div>
        <h3 id="popupTitle"></h3>
        <p id="popupMsg"></p>
        <button class="popup-btn" onclick="closePopup()">OK, Got it</button>
    </div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
