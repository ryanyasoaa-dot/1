<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Grande</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="card">
    <div class="logo">Grande</div>
    <p class="subtitle">Enter your email and we'll send you a reset link</p>

    <div id="successMsg" style="display:none;background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:16px;text-align:center"></div>
    <div id="errorMsg"   style="display:none;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:16px;text-align:center"></div>

    <form id="forgotForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="register-link"><a href="/login">&larr; Back to Sign In</a></div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    document.getElementById('successMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display   = 'none';

    const res  = await fetch('/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value })
    });
    const data = await res.json();

    btn.disabled = false;
    btn.textContent = 'Send Reset Link';

    if (data.success) {
        document.getElementById('successMsg').textContent = data.message;
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('forgotForm').style.display = 'none';
    } else {
        document.getElementById('errorMsg').textContent = data.error || 'Something went wrong.';
        document.getElementById('errorMsg').style.display = 'block';
    }
});
</script>
</body>
</html>
