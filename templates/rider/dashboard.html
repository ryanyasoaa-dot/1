<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Rider — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rider.css') }}">
</head>
<body>

<div id="sidebarOverlay"></div>
<button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>

<aside class="sidebar">
    <div class="sidebar-logo">Luxe Rider</div>
    <ul class="sidebar-menu">
        <li><a href="/rider" class="active"><span class="icon">🏠</span> Dashboard</a></li>
        <li class="menu-group">WORK</li>
        <li><a href="/rider/deliveries"><span class="icon">🚚</span> Deliveries</a></li>
        <li class="menu-group">FINANCE</li>
        <li><a href="/rider/earnings"><span class="icon">💰</span> Earnings</a></li>
        <li class="menu-group">ACCOUNT</li>
        <li><a href="/rider/profile"><span class="icon">👤</span> Profile</a></li>
    </ul>
    <div class="sidebar-footer">
        <div class="sidebar-user">🏍️ {{ session.user.name }}</div>
        <a href="/logout" class="logout-link">🚪 Logout</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-right">Rider Panel</div>
    </div>
    <div class="content">

        <div class="stats">
            <div class="stat-card"><div class="stat-label">Deliveries</div><div class="stat-value">0</div><div class="stat-icon">🚚</div></div>
            <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">0</div><div class="stat-icon">✅</div></div>
            <div class="stat-card"><div class="stat-label">Earnings</div><div class="stat-value">₱0</div><div class="stat-icon">💰</div></div>
            <div class="stat-card"><div class="stat-label">Rating</div><div class="stat-value">—</div><div class="stat-icon">⭐</div></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Recent Deliveries</h2>
                <a href="/rider/deliveries" class="btn btn-view">View All</a>
            </div>
            <table>
                <thead><tr><th>Order ID</th><th>Customer</th><th>Address</th><th>Store</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="deliveriesTable"></tbody>
            </table>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/rider.js') }}"></script>
</body>
</html>
