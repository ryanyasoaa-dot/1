<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Grande — Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
    <style>
        body { background: #f8f9fa; }
        .notif-card {
            background: #fff; border: 1px solid #e8e8f0;
            border-radius: 14px; padding: 16px 20px;
            margin-bottom: 10px; display: flex;
            align-items: flex-start; gap: 14px;
            transition: box-shadow .2s;
        }
        .notif-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
        .notif-card.unread { border-left: 3px solid #FF2BAC; background: #fff8fc; }
        .notif-icon {
            width: 42px; height: 42px; border-radius: 50%;
            background: #fff0f8; display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .notif-product-image {
            width: 50px; height: 50px; border-radius: 8px;
            object-fit: cover; flex-shrink: 0;
            border: 2px solid #f0f0f0;
        }
        .notif-content {
            flex: 1; min-width: 0;
        }
        .notif-title { 
            font-size: 14px; font-weight: 600; color: #1a1a3e; 
            margin-bottom: 2px; display: flex;
            align-items: center; gap: 8px;
        }
        .notif-product-name {
            font-size: 12px; color: #FF2BAC; font-weight: 500;
            margin-bottom: 4px;
        }
        .notif-body  { font-size: 13px; color: #6c757d; }
        .notif-time  { font-size: 11px; color: #adb5bd; margin-top: 4px; }
        .notif-badge {
            background: #FF2BAC; color: white; font-size: 10px;
            padding: 2px 6px; border-radius: 10px; font-weight: 600;
        }
        .page-title  {
            font-family: 'Playfair Display', serif;
            font-size: 26px; font-weight: 700;
            color: #1a1a3e; margin: 28px 0 20px;
        }
    </style>
</head>
<body>

{% from 'buyer/_navbar.html' import grande_navbar %}
{{ grande_navbar(user=session.get('user'), active='') }}

<div class="container pb-5">
    <div class="d-flex align-items-center justify-content-between">
        <h1 class="page-title">🔔 Notifications</h1>
        <button class="btn btn-sm btn-outline-secondary" id="markAllBtn" style="font-size:12px">
            Mark all as read
        </button>
    </div>

    <div id="notifList">
        <!-- Populated by JS -->
        <div class="text-center py-5" id="notifEmpty" style="display:none">
            <div style="font-size:56px;margin-bottom:16px">🔔</div>
            <h5 style="color:#1a1a3e;font-family:'Playfair Display',serif">You're all caught up!</h5>
            <p style="color:#6c757d;font-size:14px">No notifications yet. We'll let you know when something happens.</p>
            <a href="/buyer/market" class="btn mt-2" style="background:linear-gradient(135deg,#FF2BAC,#FF6BCE);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-weight:600">
                Browse Products
            </a>
        </div>
    </div>
</div>

<div class="shop-toast" id="shopToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/shop.js') }}"></script>
<script>
// Notification types → icon map
const NOTIF_ICONS = {
    order:    '📦',
    promo:    '🎉',
    delivery: '🚚',
    system:   'ℹ️',
    default:  '🔔',
};

function renderNotifications(items) {
    const list  = document.getElementById('notifList');
    const empty = document.getElementById('notifEmpty');

    if (!items.length) {
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';
    list.innerHTML = items.map(n => {
        const hasProductImage = n.product_image && n.product_image.trim();
        const productImageHtml = hasProductImage 
            ? `<img src="${n.product_image}" alt="Product" class="notif-product-image" onerror="this.style.display='none'">`
            : `<div class="notif-icon">${NOTIF_ICONS[n.type] || NOTIF_ICONS.default}</div>`;
        
        const productNameHtml = n.product_name 
            ? `<div class="notif-product-name">${n.product_name}</div>`
            : '';
        
        const titleBadge = n.type === 'order' && !n.is_read 
            ? `<span class="notif-badge">NEW</span>`
            : '';
        
        return `
            <div class="notif-card ${n.is_read ? '' : 'unread'}" onclick="markAsRead('${n.id}')" style="cursor: pointer;">
                ${productImageHtml}
                <div class="notif-content">
                    <div class="notif-title">
                        ${n.title || 'Notification'}
                        ${titleBadge}
                    </div>
                    ${productNameHtml}
                    <div class="notif-body">${n.message || ''}</div>
                    <div class="notif-time">${n.created_at ? new Date(n.created_at).toLocaleString('en-PH') : ''}</div>
                </div>
            </div>
        `;
    }).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
    updateCartBadge();

    // Fetch notifications — endpoint returns [] until backend is implemented
    const data = await fetch('/buyer/api/notifications')
        .then(r => r.ok ? r.json() : [])
        .catch(() => []);

    renderNotifications(Array.isArray(data) ? data : []);

    document.getElementById('markAllBtn')?.addEventListener('click', async () => {
        // Call API to mark all as read
        const result = await fetch('/buyer/api/notifications/read-all', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content || ''
            }
        }).then(r => r.ok ? r.json() : null).catch(() => null);

        if (result && result.success) {
            // Update UI
            document.querySelectorAll('.notif-card.unread').forEach(c => c.classList.remove('unread'));
            document.getElementById('gnNotifDot')?.classList.remove('has-notif');
            // Show success message
            const toast = document.getElementById('shopToast');
            if (toast) {
                toast.textContent = `Marked ${result.marked_count || 0} notification(s) as read`;
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            }
        }
    });
});

// Function to mark individual notification as read
async function markAsRead(notificationId) {
    try {
        const result = await fetch(`/buyer/api/notifications/${notificationId}/read`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content || ''
            }
        }).then(r => r.ok ? r.json() : null);

        if (result && result.success) {
            // Update the specific notification card
            const card = document.querySelector(`[onclick="markAsRead('${notificationId}')"]`);
            if (card) {
                card.classList.remove('unread');
                // Remove NEW badge
                const badge = card.querySelector('.notif-badge');
                if (badge) badge.remove();
            }
            // Update navbar badge
            updateCartBadge();
        }
    } catch (error) {
        console.error('Error marking notification as read:', error);
    }
}
</script>
</body>
</html>
