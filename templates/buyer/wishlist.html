<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe — Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
</head>
<body>

<nav class="shop-navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="/" class="navbar-brand">Luxe</a>
        <div class="d-flex gap-2">
            <a href="/buyer/cart" class="nav-icon-btn">🛒<span class="nav-badge cart-count" style="display:none">0</span></a>
            <a href="/buyer" class="nav-icon-btn">👤</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <nav class="shop-breadcrumb">
        <a href="/buyer">My Account</a> / <span>Wishlist</span>
    </nav>

    <div class="row g-4">
        <div class="col-12 col-md-3">
            <div class="settings-card">
                <div class="settings-nav d-flex flex-column gap-1">
                    <a href="/buyer" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
                    <a href="/buyer/orders" class="nav-link"><span class="icon">📦</span> My Orders</a>
                    <a href="/buyer/wishlist" class="nav-link active"><span class="icon">❤️</span> Wishlist</a>
                    <a href="/buyer/address_book" class="nav-link"><span class="icon">📍</span> Addresses</a>
                    <a href="/buyer/settings" class="nav-link"><span class="icon">⚙️</span> Settings</a>
                    <a href="/logout" class="nav-link" style="color:#ef4444"><span class="icon">🚪</span> Logout</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-9">
            <div class="section-title">My Wishlist ❤️</div>
            <div class="row g-2" id="wishlistGrid"></div>
        </div>
    </div>
</div>

<div class="shop-toast" id="shopToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/shop.js') }}"></script>
</body>
</html>
