<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe — My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/buyer.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="navbar-logo">Luxe</a>
        <div class="navbar-actions">
            <a href="/buyer" class="navbar-action-btn" title="Account">← Back</a>
            <a href="/logout" class="navbar-action-btn" title="Logout" style="color:#FF2BAC">Logout</a>
        </div>
    </div>
</nav>

<section class="buyer-section">
    <div class="container" style="max-width:560px">
        <h2 style="font-family:var(--font-display);font-size:var(--font-size-3xl);margin-bottom:24px">My Profile</h2>
        <div class="buyer-card">
            <div style="margin-bottom:20px">
                <span class="profile-label">Full Name</span>
                <span class="profile-value">{{ session.user.name }}</span>
            </div>
            <div style="margin-bottom:20px">
                <span class="profile-label">Email</span>
                <span class="profile-value">{{ session.user.email }}</span>
            </div>
            <div style="margin-bottom:20px">
                <span class="profile-label">Role</span>
                <span class="profile-value" style="text-transform:capitalize">{{ session.user.role }}</span>
            </div>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>
</section>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/buyer.js') }}"></script>
</body>
</html>
