<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Grande — My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
</head>
<body>

{% from 'buyer/_navbar.html' import grande_navbar %}
{{ grande_navbar(user=session.get('user'), active='orders') }}

<div class="container py-4">
    <nav class="shop-breadcrumb">
        <a href="/buyer/orders">Orders</a> / <span id="breadcrumbLabel">My Orders</span>
    </nav>

    <div class="row g-4">

        <!-- Sidebar -->
        <div class="col-12 col-md-3">
            <div class="settings-card mb-3">
                <div style="font-size:10px;font-weight:700;color:#adb5bd;text-transform:uppercase;letter-spacing:.8px;padding:0 4px 8px">Account</div>
                <div class="settings-nav d-flex flex-column gap-1">
                    <a href="/buyer/orders"       class="nav-link active"><span class="icon">📦</span> My Orders</a>
                    <a href="/buyer/address_book" class="nav-link"><span class="icon">📍</span> Addresses</a>
                </div>
            </div>
            <div class="settings-card">
                <div style="font-size:10px;font-weight:700;color:#adb5bd;text-transform:uppercase;letter-spacing:.8px;padding:0 4px 8px">Settings</div>
                <div class="settings-nav d-flex flex-column gap-1">
                    <a href="/buyer/settings"                  class="nav-link"><span class="icon">👤</span> Profile</a>
                    <a href="/buyer/settings#sectionPassword"  class="nav-link"><span class="icon">🔑</span> Password</a>
                    <a href="/buyer/settings#sectionNotif"     class="nav-link"><span class="icon">🔔</span> Notifications</a>
                    <a href="/buyer/settings#sectionSecurity"  class="nav-link"><span class="icon">🛡️</span> Security</a>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="col-12 col-md-9">

            <!-- ── Orders panel ── -->
            <div id="panelOrders">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <div class="section-title mb-0">My Orders</div>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-sm btn-outline-secondary active" onclick="filterOrders('all',this)">All</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterOrders('pending',this)">Pending</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterOrders('processing',this)">Processing</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterOrders('ready_for_pickup',this)">Ready for Pickup</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterOrders('in_transit',this)">In Transit</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterOrders('delivered',this)">Delivered</button>
                    </div>
                </div>
                <div id="ordersList"></div>
            </div>



        </div>
    </div>
</div>

<div class="shop-toast" id="shopToast"></div>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
async function updateCartBadge() {
    const cart = await fetch('/buyer/api/cart').then(r => r.json()).catch(() => []);
    const total = cart.reduce((s, i) => s + Number(i.quantity || 0), 0);
    document.querySelectorAll('.cart-count').forEach(el => {
        el.textContent = total;
        el.style.display = total > 0 ? 'flex' : 'none';
    });
}

let allOrders = [];

async function initOrdersPage() {
    allOrders = await API.buyer.getOrders().catch(() => []);
    renderOrders(allOrders);
}

function filterOrders(status, btn) {
    document.querySelectorAll('#panelOrders .btn-outline-secondary').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
    renderOrders(filtered);
}

function renderOrders(data) {
    const container = document.getElementById('ordersList');
    if (!data.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><h5>No orders found</h5><p>Start shopping to see your orders here.</p><a href="/buyer/market" class="btn-pink px-4 py-2">Shop Now</a></div>`;
        return;
    }
    container.innerHTML = data.map(o => `
        <div class="card mb-3 border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2 flex-wrap gap-2">
                    <div>
                        <div style="font-size:14px;font-weight:700">Order #${(o.id||'').slice(0,8).toUpperCase()}</div>
                        <div style="font-size:12px;color:var(--gray)">${new Date(o.created_at).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'})}</div>
                    </div>
                    <span class="badge text-uppercase" style="background:var(--pink);color:#fff;padding:4px 10px;border-radius:6px">${o.status.replace(/_/g,' ')}</span>
                </div>
                <div style="font-size:13px;margin-bottom:12px">${o.items_count || 0} item(s) · <strong style="color:var(--pink)">₱${Number(o.total||0).toLocaleString('en-PH',{minimumFractionDigits:2})}</strong></div>
                <div class="timeline" style="padding-left:20px">
                    ${['pending','processing','ready_for_pickup','in_transit','delivered'].map((s,i,arr) => {
                        const idx = arr.indexOf(o.status);
                        const done = i <= idx;
                        const active = i === idx;
                        return `<div class="timeline-item ${done?'done':''} ${active?'active':''}"><div class="timeline-dot"></div><div class="timeline-title" style="font-size:12px">${s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div></div>`;
                    }).join('')}
                </div>
                <a href="/buyer/order_summary?id=${o.id}" class="btn-outline-pink px-3 py-1 mt-3 d-inline-block" style="font-size:12px">View Details</a>
            </div>
        </div>
    `).join('');
}

document.addEventListener('DOMContentLoaded', () => { initOrdersPage(); updateCartBadge(); });
</script>
</body>
</html>
