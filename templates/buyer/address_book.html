<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe — Address Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
</head>
<body>

<nav class="shop-navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="/" class="navbar-brand">Luxe</a>
        <a href="/buyer" class="nav-icon-btn">👤</a>
    </div>
</nav>

<div class="container py-4">
    <nav class="shop-breadcrumb">
        <a href="/buyer">My Account</a> / <span>Address Book</span>
    </nav>

    <div class="row g-4">
        <div class="col-12 col-md-3">
            <div class="settings-card">
                <div class="settings-nav d-flex flex-column gap-1">
                    <a href="/buyer" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
                    <a href="/buyer/orders" class="nav-link"><span class="icon">📦</span> My Orders</a>
                    <a href="/buyer/wishlist" class="nav-link"><span class="icon">❤️</span> Wishlist</a>
                    <a href="/buyer/address_book" class="nav-link active"><span class="icon">📍</span> Addresses</a>
                    <a href="/buyer/settings" class="nav-link"><span class="icon">⚙️</span> Settings</a>
                    <a href="/logout" class="nav-link" style="color:#ef4444"><span class="icon">🚪</span> Logout</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="section-title mb-0">Address Book 📍</div>
                <button class="btn-pink px-3 py-2" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                    + Add Address
                </button>
            </div>
            <div id="addressList"></div>
        </div>
    </div>
</div>

<!-- Add Address Modal -->
<div class="modal fade" id="addAddressModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title" style="font-family:var(--font-display)">Add New Address</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addressForm" onsubmit="saveAddress(event)">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label-custom">Label (e.g. Home, Office)</label>
                            <input type="text" id="addrLabel" class="form-control-custom" placeholder="Home">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Region</label>
                            <input type="text" id="addrRegion" class="form-control-custom" placeholder="e.g. NCR">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">City / Municipality</label>
                            <input type="text" id="addrCity" class="form-control-custom" placeholder="e.g. Quezon City">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Barangay</label>
                            <input type="text" id="addrBarangay" class="form-control-custom" placeholder="e.g. Brgy. Holy Spirit">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">ZIP Code</label>
                            <input type="text" id="addrZip" class="form-control-custom" placeholder="e.g. 1127">
                        </div>
                        <div class="col-12">
                            <label class="form-label-custom">Street / House No.</label>
                            <input type="text" id="addrStreet" class="form-control-custom" placeholder="e.g. 123 Rizal St.">
                        </div>
                        <div class="col-12">
                            <label class="form-label-custom">Pin Location on Map</label>
                            <div id="addressMap"></div>
                            <div style="font-size:12px;color:var(--gray);margin-top:6px" id="addrCoordsDisplay">📍 Click map to pin your location</div>
                            <input type="hidden" id="addrLatitude">
                            <input type="hidden" id="addrLongitude">
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn-pink px-4 py-2 flex-grow-1">Save Address</button>
                        <button type="button" class="btn-outline-pink px-4 py-2" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="shop-toast" id="shopToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/shop.js') }}"></script>
<script>
// Init map when modal opens
document.getElementById('addAddressModal').addEventListener('shown.bs.modal', () => {
    initAddressMap();
});
</script>
</body>
</html>
