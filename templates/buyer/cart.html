<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe — Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
</head>
<body>

<nav class="shop-navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="/" class="navbar-brand">Luxe</a>
        <div class="d-flex align-items-center gap-2">
            <a href="/buyer/market" class="nav-icon-btn" style="font-size:14px">← Continue Shopping</a>
            <a href="/buyer" class="nav-icon-btn">👤</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="section-title">My Cart 🛒</div>

    <!-- Empty state -->
    <div id="cartEmpty" style="display:none">
        <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <h5>Your cart is empty</h5>
            <p>Add items to your cart to get started.</p>
            <a href="/buyer/market" class="btn-pink px-4 py-2">Shop Now</a>
        </div>
    </div>

    <div id="cartSummary" style="display:none">
        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div id="cartItems"></div>
            </div>
            <div class="col-12 col-lg-4">
                <div class="summary-box">
                    <div style="font-size:15px;font-weight:700;margin-bottom:16px">Order Summary</div>
                    <div class="summary-row"><span>Subtotal</span><span id="subtotalAmt">₱0.00</span></div>
                    <div class="summary-row"><span>Shipping</span><span id="shippingAmt">₱0.00</span></div>
                    <div class="summary-row total"><span>Total</span><span id="totalAmt">₱0.00</span></div>
                    <a href="/buyer/checkout" class="btn-pink w-100 py-3 text-center mt-3 d-block" style="border-radius:var(--radius-md)">
                        Proceed to Checkout →
                    </a>
                    <div style="font-size:12px;color:var(--gray);text-align:center;margin-top:10px">
                        Free shipping on orders over ₱500
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="shop-toast" id="shopToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/shop.js') }}"></script>
</body>
</html>
